<!DOCTYPE html>
<html>
<head>
    <meta charset='utf-8'>
    <meta http-equiv='X-UA-Compatible' content='IE=edge'>
    <title>Test</title>
    <style>
        /* html, body {
            margin: 0;
        } */
        body {
            display: flex;
            flex-direction: column;
        }
        #cy {
            width: 100%;
            height: 600px;
            display: block;
            border-color: black;
            border-radius: 5px;
        }

        #panel {
            width: 100%;
        }
        #panel form {
            display: flex;
            flex-direction: column;
            width: fit-content;
        }
        #panel form input {
            margin-bottom: 20px;
        }
    </style>
    <meta name='viewport' content='width=device-width, initial-scale=1'>
    <!-- <link rel='stylesheet' type='text/css' media='screen' href='main.css'> -->
    <script src='./static/js/vendor/cytoscape.min.js'></script>
</head>
<body>
    <div id="cy"></div>
    <div id="panel">
        <form>
            <label for="file">File</label>
            <input type="file" name="file" id="file" accept="text/csv" required>
            <label for="separator">Separator</label>
            <input type="text" name="separator" id="separator" value="," required>
            <label for="pid_column_name">PID Column Name</label>
            <input type="text" name="pid_column_name" id="pid_column_name" value="object.process.id" required>
            <label for="pid_column_name">PPID Column Name</label>
            <input type="text" name="ppid_column_name" id="ppid_column_name" value="object.process.parent.id" required>

            <input type="submit" name="submit" id="submit">
        </form>
    </div>
    <script>
        var cy = cytoscape({

            container: document.getElementById('cy'), // container to render in

            elements: [ // list of graph elements to start with
                { // node a
                data: { id: 'a' }
                },
                { // node b
                data: { id: 'b' }
                },
                { // edge ab
                data: { id: 'ab', source: 'a', target: 'b' }
                }
            ],

            style: [ // the stylesheet for the graph
                {
                selector: 'node',
                style: {
                    'background-color': '#666',
                    'label': 'data(id)'
                }
                },

                {
                selector: 'edge',
                style: {
                    'width': 3,
                    'line-color': '#ccc',
                    'target-arrow-color': '#ccc',
                    'target-arrow-shape': 'triangle',
                    'curve-style': 'bezier'
                }
                }
            ],

            layout: {
                name: 'grid',
                rows: 1
            }

        });
    </script>
</body>
</html>
